<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedido</title>
  <link rel="stylesheet" href="./static/styles/home.css" />
  <link rel="stylesheet" href="./static/styles/forms.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="crud-page">

  <div class="crud-header">
    <p class="crud-eyebrow">Gestión</p>
    <h1 class="crud-title">Pedidos</h1>
  </div>

  <div class="crud-table-wrap">
    <table class="crud-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Fecha</th>
          <th>Total</th>
          <th>ID Usuario</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td><td>2026-04-10</td><td>450.00</td><td>2</td>
        </tr>
        <tr>
          <td>2</td><td>2026-04-11</td><td>300.50</td><td>1</td>
        </tr>
        <tr>
          <td>3</td><td>2026-04-12</td><td>120.75</td><td>3</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="crud-actions">
    <button class="crud-btn" type="button" onclick="mostrarFormularioCrear()">
      <span class="crud-btn-dot"></span>Nuevo
    </button>
    <button class="crud-btn" type="button" onclick="mostrarFormularioEditar()">
      <span class="crud-btn-dot"></span>Editar
    </button>
    <button class="crud-btn danger" type="button">Eliminar</button>
    <a class="crud-btn neutral" href="./home.html">Volver</a>
  </div>

  <div class="crud-form-panel" id="crear-formulario">
    <h3 class="crud-form-title">Crear pedido</h3>
    <form class="crud-form" action="" method="post">
      
      <div class="crud-field">
        <label class="crud-label" for="crear-fecha">Fecha</label>
        <input class="crud-input" type="date" name="fechaPedido" id="crear-fecha" required />
      </div>

      <div class="crud-field">
        <label class="crud-label" for="crear-total">Total</label>
        <input class="crud-input" type="number" step="0.01" name="totalPedido" id="crear-total" placeholder="Ingresa el total…" required />
      </div>

      <div class="crud-field">
        <label class="crud-label" for="crear-usuario">ID Usuario</label>
        <input class="crud-input" type="number" name="usuario" id="crear-usuario" placeholder="ID del usuario…" required />
      </div>

      <div class="crud-form-actions">
        <button class="crud-btn crud-btn-primary" type="submit">Crear</button>
        <button class="crud-btn" type="reset">Limpiar</button>
        <button class="crud-btn neutral" type="button" onclick="ocultarFormularioCrear()">Cancelar</button>
      </div>
    </form>
  </div>

  <div class="crud-form-panel" id="editar-formulario">
    <h3 class="crud-form-title">Editar pedido</h3>
    <form class="crud-form" action="" method="post">
      
      <div class="crud-field">
        <label class="crud-label" for="actualizar-id">ID</label>
        <input class="crud-input" type="number" name="idPedido" id="actualizar-id" placeholder="ID a editar…" required />
      </div>

      <div class="crud-field">
        <label class="crud-label" for="actualizar-fecha">Fecha</label>
        <input class="crud-input" type="date" name="fechaPedido" id="actualizar-fecha" required />
      </div>

      <div class="crud-field">
        <label class="crud-label" for="actualizar-total">Total</label>
        <input class="crud-input" type="number" step="0.01" name="totalPedido" id="actualizar-total" placeholder="Nuevo total…" required />
      </div>

      <div class="crud-field">
        <label class="crud-label" for="actualizar-usuario">ID Usuario</label>
        <input class="crud-input" type="number" name="usuario" id="actualizar-usuario" placeholder="Nuevo ID usuario…" required />
      </div>

      <div class="crud-form-actions">
        <button class="crud-btn crud-btn-primary" type="submit">Guardar</button>
        <button class="crud-btn" type="reset">Limpiar</button>
        <button class="crud-btn neutral" type="button" onclick="ocultarFormularioEditar()">Cancelar</button>
      </div>
    </form>
  </div>

</div>

</body>
</html>
