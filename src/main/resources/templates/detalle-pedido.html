<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalle Pedido</title>
    <link rel="stylesheet" href="./static/styles/home.css" />
    <link rel="stylesheet" href="./static/styles/forms.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="crud-page">
      <div class="crud-header">
        <p class="crud-eyebrow">Gestión</p>
        <h1 class="crud-title">Detalle Pedido</h1>
      </div>

      <div class="crud-table-wrap">
        <table class="crud-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Cantidad</th>
              <th>Precio Unitario</th>
              <th>ID Pedido</th>
              <th>ID Producto</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td>2</td>
              <td>150.00</td>
              <td>1</td>
              <td>3</td>
            </tr>
            <tr>
              <td>2</td>
              <td>1</td>
              <td>300.00</td>
              <td>1</td>
              <td>5</td>
            </tr>
            <tr>
              <td>3</td>
              <td>4</td>
              <td>75.50</td>
              <td>2</td>
              <td>2</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="crud-actions">
        <button
          class="crud-btn"
          type="button"
          onclick="mostrarFormularioCrear()"
        >
          <span class="crud-btn-dot"></span>Nuevo
        </button>
        <button
          class="crud-btn"
          type="button"
          onclick="mostrarFormularioEditar()"
        >
          <span class="crud-btn-dot"></span>Editar
        </button>
        <button class="crud-btn danger" type="button">Eliminar</button>
        <a class="crud-btn neutral" href="./home.html">Volver</a>
      </div>

      <div class="crud-form-panel" id="crear-formulario">
        <h3 class="crud-form-title">Crear detalle pedido</h3>
        <form class="crud-form" action="" method="post">
          <div class="crud-field">
            <label class="crud-label" for="crear-cantidad">Cantidad</label>
            <input
              class="crud-input"
              type="number"
              name="cantidad"
              id="crear-cantidad"
              placeholder="Ingresa la cantidad…"
              required
            />
          </div>

          <div class="crud-field">
            <label class="crud-label" for="crear-precio">Precio Unitario</label>
            <input
              class="crud-input"
              type="number"
              step="0.01"
              name="precioUnitario"
              id="crear-precio"
              placeholder="Ingresa el precio…"
              required
            />
          </div>

          <div class="crud-field">
            <label class="crud-label" for="crear-pedido">ID Pedido</label>
            <input
              class="crud-input"
              type="number"
              name="pedido"
              id="crear-pedido"
              placeholder="ID del pedido…"
              required
            />
          </div>

          <div class="crud-field">
            <label class="crud-label" for="crear-producto">ID Producto</label>
            <input
              class="crud-input"
              type="number"
              name="producto"
              id="crear-producto"
              placeholder="ID del producto…"
              required
            />
          </div>

          <div class="crud-form-actions">
            <button class="crud-btn crud-btn-primary" type="submit">
              Crear
            </button>
            <button class="crud-btn" type="reset">Limpiar</button>
            <button
              class="crud-btn neutral"
              type="button"
              onclick="ocultarFormularioCrear()"
            >
              Cancelar
            </button>
          </div>
        </form>
      </div>

      <div class="crud-form-panel" id="editar-formulario">
        <h3 class="crud-form-title">Editar detalle pedido</h3>
        <form class="crud-form" action="" method="post">
          <div class="crud-field">
            <label class="crud-label" for="actualizar-id">ID</label>
            <input
              class="crud-input"
              type="number"
              name="idDetalle"
              id="actualizar-id"
              placeholder="ID a editar…"
              required
            />
          </div>

          <div class="crud-field">
            <label class="crud-label" for="actualizar-cantidad">Cantidad</label>
            <input
              class="crud-input"
              type="number"
              name="cantidad"
              id="actualizar-cantidad"
              placeholder="Nueva cantidad…"
              required
            />
          </div>

          <div class="crud-field">
            <label class="crud-label" for="actualizar-precio"
              >Precio Unitario</label
            >
            <input
              class="crud-input"
              type="number"
              step="0.01"
              name="precioUnitario"
              id="actualizar-precio"
              placeholder="Nuevo precio…"
              required
            />
          </div>

          <div class="crud-field">
            <label class="crud-label" for="actualizar-pedido">ID Pedido</label>
            <input
              class="crud-input"
              type="number"
              name="pedido"
              id="actualizar-pedido"
              placeholder="Nuevo ID pedido…"
              required
            />
          </div>

          <div class="crud-field">
            <label class="crud-label" for="actualizar-producto"
              >ID Producto</label
            >
            <input
              class="crud-input"
              type="number"
              name="producto"
              id="actualizar-producto"
              placeholder="Nuevo ID producto…"
              required
            />
          </div>

          <div class="crud-form-actions">
            <button class="crud-btn crud-btn-primary" type="submit">
              Guardar
            </button>
            <button class="crud-btn" type="reset">Limpiar</button>
            <button
              class="crud-btn neutral"
              type="button"
              onclick="ocultarFormularioEditar()"
            >
              Cancelar
            </button>
          </div>
        </form>
      </div>
    </div>

    <footer class="ht-footer">
      <small class="ht-copy">© Jorge Ernesto Alvarez Pérez</small>
      <div class="ht-social">
        <a class="ht-social-link" href="mailto:jalvarez-2025306@kinal.edu.gt">
          <i class="fa-solid fa-envelope"></i> Outlook
        </a>
        <a
          class="ht-social-link"
          href="https://wa.me/50242834330"
          target="_blank"
        >
          <i class="fa-brands fa-whatsapp"></i> WhatsApp
        </a>
        <a class="ht-social-link" href="https://github.com/jorjaizz">
          <i class="fa-brands fa-github"></i> GitHub
        </a>
      </div>
    </footer>

    <script src="./static/js/script.js"></script>
  </body>
</html>
