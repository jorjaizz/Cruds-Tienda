<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuario</title>
  <link rel="stylesheet" href="./static/styles/home.css" />
  <link rel="stylesheet" href="./static/styles/forms.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="crud-page">

  <div class="crud-header">
    <p class="crud-eyebrow">Gestión</p>
    <h1 class="crud-title">Usuarios</h1>
  </div>

  <div class="crud-table-wrap">
    <table class="crud-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>Edad</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td><td>Juan</td><td>Pérez</td><td>25</td>
        </tr>
        <tr>
          <td>2</td><td>Ana</td><td>López</td><td>30</td>
        </tr>
        <tr>
          <td>3</td><td>Carlos</td><td>Ramírez</td><td>22</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="crud-actions">
    <button class="crud-btn" type="button" onclick="mostrarFormularioCrear()">
      <span class="crud-btn-dot"></span>Nuevo
    </button>
    <button class="crud-btn" type="button" onclick="mostrarFormularioEditar()">
      <span class="crud-btn-dot"></span>Editar
    </button>
    <button class="crud-btn danger" type="button">Eliminar</button>
    <a class="crud-btn neutral" href="./home.html">Volver</a>
  </div>

  <div class="crud-form-panel" id="crear-formulario">
    <h3 class="crud-form-title">Crear usuario</h3>
    <form class="crud-form" action="" method="post">
      
      <div class="crud-field">
        <label class="crud-label" for="crear-nombre">Nombre</label>
        <input class="crud-input" type="text" name="nombreUsuario" id="crear-nombre" placeholder="Ingresa el nombre…" required />
      </div>

      <div class="crud-field">
        <label class="crud-label" for="crear-apellido">Apellido</label>
        <input class="crud-input" type="text" name="apellidoUsuario" id="crear-apellido" placeholder="Ingresa el apellido…" required />
      </div>

      <div class="crud-field">
        <label class="crud-label" for="crear-edad">Edad</label>
        <input class="crud-input" type="number" name="edadUsuario" id="crear-edad" placeholder="Ingresa la edad…" required />
      </div>

      <div class="crud-form-actions">
        <button class="crud-btn crud-btn-primary" type="submit">Crear</button>
        <button class="crud-btn" type="reset">Limpiar</button>
        <button class="crud-btn neutral" type="button" onclick="ocultarFormularioCrear()">Cancelar</button>
      </div>
    </form>
  </div>

  <div class="crud-form-panel" id="editar-formulario">
    <h3 class="crud-form-title">Editar usuario</h3>
    <form class="crud-form" action="" method="post">
      
      <div class="crud-field">
        <label class="crud-label" for="actualizar-id">ID</label>
        <input class="crud-input" type="number" name="idUsuario" id="actualizar-id" placeholder="ID a editar…" required />
      </div>

      <div class="crud-field">
        <label class="crud-label" for="actualizar-nombre">Nombre</label>
        <input class="crud-input" type="text" name="nombreUsuario" id="actualizar-nombre" placeholder="Nuevo nombre…" required />
      </div>

      <div class="crud-field">
        <label class="crud-label" for="actualizar-apellido">Apellido</label>
        <input class="crud-input" type="text" name="apellidoUsuario" id="actualizar-apellido" placeholder="Nuevo apellido…" required />
      </div>

      <div class="crud-field">
        <label class="crud-label" for="actualizar-edad">Edad</label>
        <input class="crud-input" type="number" name="edadUsuario" id="actualizar-edad" placeholder="Nueva edad…" required />
      </div>

      <div class="crud-form-actions">
        <button class="crud-btn crud-btn-primary" type="submit">Guardar</button>
        <button class="crud-btn" type="reset">Limpiar</button>
        <button class="crud-btn neutral" type="button" onclick="ocultarFormularioEditar()">Cancelar</button>
      </div>
    </form>
  </div>

</div>

</body>
</html>
